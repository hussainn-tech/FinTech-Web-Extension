<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BAMBUCORN - Investor Insights</title>
    <link rel="stylesheet" href="css/index.css" />
    <style>
      /* General Styles */
      body {
        font-family: 'Comic Sans MS', sans-serif;
        margin: 0;
        padding: 0;
        background-color: #EB9421; /* Updated to the specified yellow color */
        overflow: hidden; /* Prevent scrollbars */
        position: relative;
      }

      .App {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 90vh;
        padding: 20px;
        z-index: 2; /* Ensure content is above the background */
      }

      .content {
        background: #fff;
        border-radius: 0px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        max-width: 600px;
        padding: 30px;
        text-align: center;
        z-index: 3; /* Ensure content is above the background */
      }

      h2 {
        color: #2c3e50;
        font-size: 24px;
        margin-bottom: 20px;
      }

      p {
        font-size: 18px;
        line-height: 1.5;
        margin-bottom: 20px;
      }

      ul {
        list-style-type: disc;
        padding-left: 20px;
        text-align: center;
      }

      ul li {
        font-size: 20px;
        line-height: 1.8;
        color: #ffffff;
      }

      /* Responsive Design */
      @media (max-width: 100px) {
        .content {
          padding: 10px;
        }

        h2 {
          font-size: 20px;
        }

        p {
          font-size: 16px;
        }

        ul li {
          font-size: 14px;
        }
      }
      /* Style for the button list */
.button-list {
  list-style-type: none;
  padding: 0;
  margin: 0;
}

.button-item {
  display: inline-block;
  padding: 10px 20px;
  width: 150px;
  height: 20px;
  line-height: 20px;
  background-color: black;
  color: white;
  text-decoration: none;
  border-radius: 5px;
  margin: 5px;
  transition: background-color 0.3s;
  cursor: pointer;
}

/* Change background color on hover */
.button-item:hover {
  background-color: #EB9421;
  color: black;
}

    </style>
  </head>
  <body>
    <div class="App">
      <section class="content">
        <img class="graphic" src="images/logo.png" alt="Graphic" />
        <h2>Binary Builders</h2>
        <ul class="button-list">
          <li><a href="./page1.html" class="button-item">Advice</a></li>
          <li><a href="https://bambucorn.com/blogs/bahrain/" target="_blank" class="button-item">Blogs</a></li>
          <li><a href="./page2.html" class="button-item">About Us</a></li>
          <li><a href="https://bambucorn.com/faqs/bahrain/" target="_blank" class="button-item">FAQ</a></li>
        </ul>
        
       
      </section>
    </div>

    <!-- Include the external script -->
    <script src="script.js"></script>
  </body>
</html>
